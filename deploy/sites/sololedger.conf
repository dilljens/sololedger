# SoloLedger — managed by sololedger repo deploy
sololedger.ferrumeng.com {
    redir / /app/ 302

    @api { path /api/* }
    handle @api {
        reverse_proxy localhost:8100
    }

    @docs { path /docs path /openapi.json }
    handle @docs {
        reverse_proxy localhost:8100
    }

    handle {
        reverse_proxy localhost:8100
    }

    log { output file /data/sololedger-access.log }
}
