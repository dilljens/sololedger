# SoloLedger — managed by sololedger repo deploy
sololedger.ferrumeng.com {
    redir / /app/ 302

    handle /api/* {
        reverse_proxy 127.0.0.1:8100
    }

    handle /docs* {
        reverse_proxy 127.0.0.1:8100
    }

    handle /openapi.json {
        reverse_proxy 127.0.0.1:8100
    }

    handle {
        reverse_proxy 127.0.0.1:8100
    }
}
