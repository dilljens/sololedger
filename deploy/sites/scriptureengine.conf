# ScriptureEngine — managed by scriptureengine repo deploy
# SPA bind mount: /var/www/scripture/frontend/dist -> /var/www/scripture
scriptureengine.org www.scriptureengine.org {
    root * /var/www/scripture

    handle /api/* {
        reverse_proxy 127.0.0.1:8000
    }

    handle /docs* {
        reverse_proxy 127.0.0.1:8000
    }

    handle /openapi.json {
        reverse_proxy 127.0.0.1:8000
    }

    handle {
        file_server
        try_files {path} /index.html
    }
}
