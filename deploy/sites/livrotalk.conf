# LivroTalk — managed by livrotalk repo deploy
livrotalk.ferrumeng.com {
    root * /var/www/livrotalk

    @api { path /api/* }
    handle @api {
        reverse_proxy localhost:8001
    }

    @audio { path /audio/* }
    handle @audio {
        reverse_proxy localhost:8001
    }

    @files { path /files/* }
    handle @files {
        reverse_proxy localhost:8001
    }

    @health { path /health }
    handle @health {
        reverse_proxy localhost:8001
    }

    handle {
        file_server
        try_files {path} /index.html
    }

    log { output file /data/livrotalk-access.log }
}
