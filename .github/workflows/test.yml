name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Lint with compile-check
        run: |
          python -c "
          import py_compile, glob, os
          files = glob.glob('app/**/*.py', recursive=True)
          for f in sorted(files):
              py_compile.compile(f, doraise=True)
          print(f'All {len(files)} files compile OK')
          "

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Verify ledger integrity
        run: |
          python -m app.main check

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check JS files compile
        run: |
          files=$(find web/js -name '*.js' | sort)
          for f in $files; do
            node --check "$f"
            echo "  ✓ $f"
          done
          count=$(echo "$files" | wc -l)
          echo "All $count JS files pass syntax check"

      - name: Check CSS files exist and are non-empty
        run: |
          wc -l web/css/*.css
